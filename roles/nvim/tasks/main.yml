---
- name: Install packages for Neovim
  become: yes
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  with_items:
    - curl
    - ripgrep
  tags:
    - nvim

- name: Download Neovim appimage
  become: yes
  ansible.builtin.uri:
    url: https://github.com/neovim/neovim/releases/latest/download/nvim.appimage
    dest: /usr/bin/
  tags:
    - nvim

- name: Create Neovim symbolic link to appimage
  become: yes
  ansible.builtin.file:
    src: /usr/bin/nvim.appimage
    dest: /usr/bin/nvim
    owner: root
    group: root
    state: link
  tags:
    - nvim

- name: Set Neovim permissions
  become: yes
  ansible.builtin.file:
    path: /usr/bin/nvim.appimage
    mode: '0755'
  tags:
    - nvim

- name: Check if Neovim config exists
  ansible.builtin.stat:
    path: "{{ nvim_config }}"
  register: nvim_config_check
  ignore_errors: true
  tags:
    - nvim

- name: Create Neovim config symbolic link
  ansible.builtin.file:
    src: "{{ ansible_env.PWD }}/roles/nvim/files/nvim"
    dest: "{{ nvim_config }}"
    state: link
  when: not nvim_config_check.stat.exists
  tags:
    - nvim

